name: Build and deploy API to Azure Container Apps

on:
  push:
    branches: ["main"]
    paths:
      - "backend/**"
      - ".github/workflows/azure-container-apps.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: uspsa-api-production
  cancel-in-progress: true

jobs:
  test-build-deploy:
    runs-on: ubuntu-latest
    environment: Production

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        working-directory: backend
        run: python -m pip install -r requirements.txt

      - name: Validate Python source
        working-directory: backend
        run: python -m compileall -q .

      - name: Log in to Azure
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build image and deploy Container App
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}/backend
          acrName: ${{ vars.AZURE_CONTAINER_REGISTRY_NAME }}
          containerAppName: ${{ vars.AZURE_CONTAINER_APP_NAME }}
          resourceGroup: ${{ vars.AZURE_RESOURCE_GROUP }}
          imageToBuild: >-
            ${{ vars.AZURE_CONTAINER_REGISTRY_NAME }}.azurecr.io/uspsa-api:${{ github.sha }}
          ingress: external
          targetPort: 8000

      - name: Show deployed endpoint
        run: |
          az containerapp show \
            --name "${{ vars.AZURE_CONTAINER_APP_NAME }}" \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --query properties.configuration.ingress.fqdn \
            --output tsv
